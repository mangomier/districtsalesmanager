<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    padding: 20px;
  }
 
  .map-wrapper {
    position: relative;
    width: 100%;
    max-width: 500px;
  }
 
  /* ── SVG-kartan ── */
  .map-wrapper svg {
    width: 100%;
    height: auto;
    display: block;
  }
 
  /* ── Klickbara overlay-ytor ovanpå SVG ── */
  .district-link {
    position: absolute;
    display: block;
    cursor: pointer;
    border-radius: 50%;
    /* Varje länk positioneras via inline style nedan */
  }
 
  /* ── Tooltip-kort ── */
  .tooltip {
    position: absolute;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 14px 16px;
    min-width: 220px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s ease;
    z-index: 10;
    font-size: 13px;
    line-height: 1.5;
  }
 
  .tooltip.active {
    opacity: 1;
    pointer-events: auto;
  }
 
  .tooltip .district-name {
    font-size: 11px;
    font-weight: bold;
    color: #E87722;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
 
  .tooltip .contact-name {
    font-size: 15px;
    font-weight: bold;
    color: #222;
    margin-bottom: 6px;
  }
 
  .tooltip .contact-phone {
    color: #444;
    margin-bottom: 4px;
  }
 
  .tooltip .contact-email a {
    color: #E87722;
    text-decoration: none;
  }
 
  .tooltip .contact-email a:hover {
    text-decoration: underline;
  }
 
  /* ── Hover-effekt direkt på SVG-polygoner ── */
  /* Regionfärger – ger highlight vid hover via filter */
  .map-wrapper:hover .tooltip { /* keeps tooltip visible when moving to it */ }
 
  /* Highlight-klasser som läggs till vid hover via JS */
  .highlight-region {
    filter: brightness(1.35) saturate(1.2);
    cursor: pointer;
  }
</style>

<script>
var contacts = {
  "ovre-norrland": {
    district: "Distrikt Övre Norrland",
    name:     "Vakans",

    email:    "info@jobmantexet.se"
  },
  "nedre-norrland": {

    email:    "lars.edholm@jobmantexet.se"
  },
  "mellan": {
    district: "Distrikt Mellan",
    name:     "Eric Lillberg",
    phone:    "070-235 70 50",
    email:    "eric.lillberg@jobmantexet.se"
  },
  "stockholm-norr": {
    district: "Distrikt Stockholm Norr",
    name:     "Alfons Lindblad",
    phone:    "070-510 88 79",
    email:    "alfons.lindblad@jobmantexet.se"
  },
  "vast": {
    district: "Distrikt Väst",
    name:     "Filip Olsson",
    phone:    "070-899 80 02",
    email:    "filip.olsson@jobmantexet.se"
  },
  "stockholm-syd": {
    district: "Distrikt Stockholm Syd",
    name:     "Kristina Eriksson",
    phone:    "073-145 96 96",
    email:    "kristina.eriksson@jobmantexet.se"
  },
  "ost": {
    district: "Distrikt Öst",
    name:     "Sebastian Sjöö",
    phone:    "070-899 80 06",
    email:    "sebastian.sjoo@jobmantexet.se"
  },
  "syd": {
    district: "Distrikt Syd",
    name:     "Pelle Bengtsson",
    phone:    "070-255 16 77",
    email:    "pelle.bengtsson@jobmantexet.se"
  }
};
 
var wrap    = document.getElementById("mapWrap");
var tooltip = document.getElementById("tooltip");
var ttDistrict = document.getElementById("tt-district");
var ttName     = document.getElementById("tt-name");
var ttPhone    = document.getElementById("tt-phone");
var ttEmail    = document.getElementById("tt-email");
 
var hideTimer = null;
 
function showTooltip(key, x, y) {
  clearTimeout(hideTimer);
  var c = contacts[key];
  if (!c) return;
 
  ttDistrict.textContent = c.district;
  ttName.textContent     = c.name;
  ttPhone.textContent    = "📞 " + c.phone;
  ttEmail.textContent    = "✉ " + c.email;
  ttEmail.href           = "mailto:" + c.email;
 
  var wrapRect = wrap.getBoundingClientRect();
  var ttW = 240;
  var left = x + 16;
  if (left + ttW > wrapRect.width) left = x - ttW - 16;
  if (left < 0) left = 8;
 
  tooltip.style.left = left + "px";
  tooltip.style.top  = (y - 10) + "px";
  tooltip.classList.add("active");
}
 
function scheduleHide() {
  hideTimer = setTimeout(function() {
    tooltip.classList.remove("active");
  }, 200);
}
 
/* Koppla hover till varje zon-polygon */
var zones = document.querySelectorAll("#district-overlays polygon");
zones.forEach(function(zone) {
  var key = zone.id.replace("zone-", "");
 
  zone.addEventListener("mousemove", function(e) {
    var rect = wrap.getBoundingClientRect();
    var x = e.clientX - rect.left;
    var y = e.clientY - rect.top;
    showTooltip(key, x, y);
  });
 
  zone.addEventListener("mouseleave", scheduleHide);
 
  zone.addEventListener("click", function() {
    var c = contacts[key];
    if (c) window.location.href = "mailto:" + c.email;
  });
});
 
/* Tooltip håller sig synlig när musen är över den */
tooltip.addEventListener("mouseenter", function() {
  clearTimeout(hideTimer);
});
tooltip.addEventListener("mouseleave", scheduleHide);
</script>
